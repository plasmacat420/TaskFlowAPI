<!--
  task-form.component.html — Create/Edit Task Form Template

  Key Angular Reactive Forms directives:
  [formGroup]       — binds the template to the FormGroup instance in the component
  formControlName   — binds a form element to a specific FormControl within the group
  (ngSubmit)        — fires on form submission (handles both Enter key and button click)

  [class.error]     — adds "error" class conditionally (toggles border-color via CSS)
  *ngIf on errors   — shows validation messages only when the field is invalid and touched
-->

<div class="form-page">

  <!-- Page header -->
  <div class="page-header">
    <h1 class="page-title">{{ isEditMode ? 'Edit Task' : 'Create New Task' }}</h1>
    <button class="btn btn-secondary" (click)="cancel()">Cancel</button>
  </div>

  <!-- Error message -->
  <div *ngIf="error" class="alert alert-error">{{ error }}</div>

  <!-- Loading state (edit mode only) -->
  <div *ngIf="loading" class="loading-state">
    <p>Loading task data...</p>
  </div>

  <!-- Form -->
  <div class="card form-card" *ngIf="!loading">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <!-- Title -->
      <div class="form-group">
        <label for="title">Title <span class="required">*</span></label>
        <input
          id="title"
          type="text"
          class="form-control"
          [class.error]="isFieldInvalid('title')"
          formControlName="title"
          placeholder="What needs to be done?"
          autocomplete="off"
        />
        <span class="error-text" *ngIf="isFieldInvalid('title')">
          {{ getFieldError('title') }}
        </span>
      </div>

      <!-- Description -->
      <div class="form-group">
        <label for="description">Description</label>
        <textarea
          id="description"
          class="form-control"
          [class.error]="isFieldInvalid('description')"
          formControlName="description"
          placeholder="Add more details (optional)"
          rows="3"
        ></textarea>
        <span class="error-text" *ngIf="isFieldInvalid('description')">
          {{ getFieldError('description') }}
        </span>
      </div>

      <!-- Two-column row: Status + Priority -->
      <div class="form-row">
        <div class="form-group">
          <label for="status">Status</label>
          <select id="status" class="form-control" formControlName="status">
            <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="priority">Priority</label>
          <select id="priority" class="form-control" formControlName="priority">
            <option *ngFor="let p of priorities" [value]="p">{{ p }}</option>
          </select>
        </div>
      </div>

      <!-- Two-column row: Due Date + Assigned User -->
      <div class="form-row">
        <div class="form-group">
          <label for="dueDate">Due Date</label>
          <input
            id="dueDate"
            type="date"
            class="form-control"
            formControlName="dueDate"
          />
        </div>

        <div class="form-group">
          <label for="assignedUserId">Assign To</label>
          <select id="assignedUserId" class="form-control" formControlName="assignedUserId">
            <option [value]="null">— Unassigned —</option>
            <option *ngFor="let user of users" [value]="user.id">{{ user.name }}</option>
          </select>
        </div>
      </div>

      <!-- Submit -->
      <div class="form-actions">
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="submitting"
        >
          {{ submitting ? 'Saving...' : (isEditMode ? 'Save Changes' : 'Create Task') }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
      </div>

    </form>
  </div>

</div>
