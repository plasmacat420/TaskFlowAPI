<!--
  app.component.html — Root Application Shell Template

  WHY this structure:
  The navigation bar is rendered once and persists across all route changes.
  <router-outlet> is the dynamic slot where Angular renders the current route's component.
  This avoids re-rendering the nav on every navigation (more efficient, better UX).

  routerLink — Angular directive that navigates without a full page reload.
  routerLinkActive — adds the "active" CSS class when the route matches.
-->
<div class="app-shell">

  <!-- ── Navigation Bar ──────────────────────────────────────────────────── -->
  <nav class="navbar">
    <a routerLink="/dashboard" class="nav-brand">
      <span class="brand-icon">✓</span>
      <span class="brand-name">TaskFlow</span>
    </a>

    <!-- Hamburger button for mobile -->
    <button class="menu-toggle" (click)="toggleMenu()" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>

    <!-- Nav links — hidden on mobile until menu is toggled -->
    <ul class="nav-links" [class.open]="menuOpen">
      <li>
        <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">
          Dashboard
        </a>
      </li>
      <li>
        <a routerLink="/tasks" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">
          Tasks
        </a>
      </li>
      <li>
        <a routerLink="/tasks/new" routerLinkActive="active" (click)="closeMenu()">
          + New Task
        </a>
      </li>
      <li>
        <a routerLink="/users" routerLinkActive="active" (click)="closeMenu()">
          Users
        </a>
      </li>
      <li>
        <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">
          About
        </a>
      </li>
    </ul>
  </nav>

  <!-- ── API Status Banners ───────────────────────────────────────────────── -->
  <!-- Shown while Render cold-starts (free tier sleeps after 15 min idle) -->
  <div *ngIf="apiConnecting" class="api-banner api-banner-connecting">
    ⏳ Connecting to API... (first visit may take ~30s while the server wakes up)
  </div>
  <div *ngIf="apiError" class="api-banner api-banner-error">
    ⚠️ API unreachable. The server may be starting up — wait 30 seconds then
    <button class="btn-retry" (click)="ngOnInit()">retry</button>.
  </div>

  <!-- ── Main Content Area ────────────────────────────────────────────────── -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

</div>
