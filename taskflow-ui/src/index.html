<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TaskFlow</title>
  <!--
    base href is set at build time by the deploy script:
    ng build --base-href /your-repo-name/
    This is required for GitHub Pages routing to work correctly.
    Without it, Angular Router generates absolute paths that break on GitHub Pages subdirectories.
  -->
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <!--
    app-root is where Angular bootstraps the application.
    Angular replaces this element with the AppComponent template.
    The selector "app-root" is defined in AppComponent's @Component decorator.
  -->
  <app-root></app-root>
</body>
</html>
